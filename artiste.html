        </ul>
    </nav>
</div>
<div class="slide" id="home">
    <header>
        <div id="logo">LoISH</div>
        <nav>
            <ul>
                <li><a href="index.html">Home</a></li>
                <li><a href="galerie.html">Gallery</a></li>
                <li><a href="artiste.html">Artist</a></li>
                <li><a href="livre.html">Contact</a></li>
            </ul>
            <div id="burger">
                <div class="bar"></div>
                <div class="bar"></div>
                <div class="bar"></div>
            </div>
        </nav>

</div>
<div  id="footer">
    <div class="container2">
        <h3>FOOTER</h3>
    </div>
</div>


<script src="dist/js/glightbox.min.js"></script>
<script>
    var lightbox = GLightbox();
    var lightboxDescription = GLightbox({
        selector: '.gal'
    });

    const burger = document.querySelector("#burger");
    const menuMobile = document.querySelector("#menu-mobile");
    //select links (retourne un tableau - array)
    const links = document.querySelectorAll ("#menu-mobile nav ul li a")


    // fonction fléchee () => {}
    burger.addEventListener("click",()=>{
        burger.classList.toggle("open");
        menuMobile.classList.toggle("open");
    })

    //boucle/parcourir le tableau link
    for(let link of links){
        link.addEventListener("click",()=>{
            burger.classList.remove("open")
            menuMobile.classList.remove("open")
        })
    }

</script>
</body>
</html>
